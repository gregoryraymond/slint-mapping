name: Deploy demo to GitHub Pages

# Runs on every push to main (the demo is part of the README's
# advertising surface, so keeping it in sync with main is the
# priority) and on manual dispatch from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages requires these scopes for the deploy step.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. New runs queue; we don't cancel
# the in-progress one because deploys are quick and aborting them
# can leave the site half-written.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          # Cache the workspace root so re-runs are fast — Slint +
          # winit-web + femtovg are a sizeable compile.
          workspaces: ". -> target"

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build wasm-demo
        working-directory: wasm-demo
        run: trunk build --release --public-url /slint-mapping/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasm-demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
