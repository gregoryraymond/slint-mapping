<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>slint-mapping — live demo</title>
    <!-- Inline SVG map-pin favicon. Avoids a separate asset file (and
         the 404 you get from leaving favicon.ico unresolved) without
         adding any HTTP round-trip to the page load. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%231d76db' d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z'/%3E%3C/svg%3E">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1a1a1a;
            color: #ddd;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        canvas {
            /* Slint / winit-web inserts the rendering canvas into the
               document body. Make it fill the viewport so the map
               isn't a 300×150-pixel postage stamp in the corner. */
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Slint's winit-web backend looks for a <canvas id="canvas">
         element to attach to. Without one in the page, init() resolves
         successfully but no rendering surface ever materialises — see
         https://github.com/slint-ui/slint/blob/master/examples/slide_puzzle/index.html
         for the canonical pattern. -->
    <canvas id="canvas"></canvas>
    <div id="loading">Loading slint-mapping demo…</div>
    <script type="module">
        // Size the canvas to the viewport BEFORE init() runs. Slint
        // honours whatever width/height attributes the canvas already
        // has when it attaches; if we leave it default, the Window's
        // preferred-width/height (800×600) wins and you get dark
        // bands around a small canvas on wider viewports. Setting
        // these here makes the map full-bleed at whatever size the
        // browser window is.
        const canvas = document.getElementById('canvas');
        const sizeCanvas = () => {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.round(window.innerWidth * dpr);
            canvas.height = Math.round(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        };
        sizeCanvas();
        window.addEventListener('resize', sizeCanvas);

        // ---- Pinch-zoom (wasm side) ----------------------------------
        //
        // Slint's ScaleRotateGestureHandler relies on the platform
        // emitting a PinchGesture event, which winit-web currently
        // doesn't synthesise from browser pointer events (only macOS
        // and iOS get them natively). So we detect pinch ourselves
        // here in JS using the Pointer Events API, then translate it
        // into synthetic WheelEvents on the canvas — Slint's existing
        // TouchArea.scroll-event already converts those into our
        // `zoom-by(delta, anchor-x, anchor-y)` callback, so the whole
        // map zooming pipeline gets reused for free.
        //
        // Mapping: each frame of a two-pointer pinch produces a scale
        // ratio (currentDistance / lastDistance). We feed `log2(ratio)`
        // multiplied by the same 120-per-notch factor wheel events
        // use, so a 2× pinch == one full wheel notch zoom. Anchor goes
        // at the midpoint between the two pointers.
        const activePointers = new Map(); // pointerId → { x, y }
        let lastPinchDistance = null;

        const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        const midpoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

        canvas.addEventListener('pointerdown', (e) => {
            if (e.pointerType !== 'touch') return;
            try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (activePointers.size === 2) {
                const [a, b] = [...activePointers.values()];
                lastPinchDistance = distance(a, b);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!activePointers.has(e.pointerId)) return;
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (activePointers.size === 2 && lastPinchDistance !== null) {
                const [a, b] = [...activePointers.values()];
                const newDistance = distance(a, b);
                if (newDistance < 1 || lastPinchDistance < 1) return;
                const ratio = newDistance / lastPinchDistance;
                if (Math.abs(ratio - 1) < 0.005) return;
                const mid = midpoint(a, b);
                // log2(ratio) is the zoom-level delta. Positive scale
                // (pinch-out) → positive delta → zoom in. Slint's
                // zoom-by callback expects that same sign convention.
                const delta = Math.log2(ratio);
                // Call directly into Rust via the wasm-bindgen export
                // in wasm-demo/src/lib.rs::pinch_zoom. This bypasses
                // Slint's TouchArea wheel pipeline (which doesn't
                // pick up synthetic OR real wheel events reliably on
                // wasm) and invokes the same zoom-by callback.
                if (typeof pinch_zoom === 'function') {
                    pinch_zoom(delta, mid.x, mid.y);
                }
                lastPinchDistance = newDistance;
            }
        });

        const endPointer = (e) => {
            if (!activePointers.has(e.pointerId)) return;
            activePointers.delete(e.pointerId);
            if (activePointers.size < 2) lastPinchDistance = null;
        };
        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);
        canvas.addEventListener('pointerleave', endPointer);
    </script>
    <script type="module">
        // `--target web` emits an ES module shim. The default export
        // `init()` resolves once the wasm has fetched and instantiated;
        // the `#[wasm_bindgen(start)]` entry in lib.rs runs as part of
        // that resolution.
        import init, { pinch_zoom, current_zoom } from './pkg/slint_mapping_wasm_demo.js';
        // Expose so the pinch detector in the earlier <script> block
        // can reach it; that script ran first and only sees globals.
        window.pinch_zoom = pinch_zoom;
        window.current_zoom = current_zoom;

        // winit's web backend yields control back to the browser
        // event loop by *throwing* a JS exception with this exact
        // text. The exception itself is the documented mechanism, not
        // a failure — see
        // https://docs.rs/winit/latest/winit/platform/web/. Filter
        // it out here so our catch handler doesn't show a red
        // "Failed to start" overlay on top of a perfectly working
        // canvas.
        const WINIT_CONTROL_FLOW = /Using exceptions for control flow/;

        try {
            await init();
            document.getElementById('loading')?.remove();
        } catch (err) {
            if (WINIT_CONTROL_FLOW.test(String(err?.message ?? err))) {
                // Demo is up — winit just escaped the init call
                // stack to hand back to requestAnimationFrame.
                document.getElementById('loading')?.remove();
            } else {
                const el = document.getElementById('loading');
                if (el) {
                    el.textContent = 'Failed to start demo — see console for details.';
                    el.style.opacity = '1';
                    el.style.color = '#ef4444';
                }
                console.error(err);
            }
        }
    </script>
</body>
</html>
