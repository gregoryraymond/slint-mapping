<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>slint-mapping — live demo</title>
    <!-- Inline SVG map-pin favicon. Avoids a separate asset file (and
         the 404 you get from leaving favicon.ico unresolved) without
         adding any HTTP round-trip to the page load. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%231d76db' d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z'/%3E%3C/svg%3E">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1a1a1a;
            color: #ddd;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        canvas {
            /* Slint / winit-web inserts the rendering canvas into the
               document body. Make it fill the viewport so the map
               isn't a 300×150-pixel postage stamp in the corner. */
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loading">Loading slint-mapping demo…</div>
    <script type="module">
        // `--target web` emits an ES module shim. The default export
        // `init()` resolves once the wasm has fetched and instantiated;
        // the `#[wasm_bindgen(start)]` entry in lib.rs runs as part of
        // that resolution.
        import init from './pkg/slint_mapping_wasm_demo.js';

        // winit's web backend yields control back to the browser
        // event loop by *throwing* a JS exception with this exact
        // text. The exception itself is the documented mechanism, not
        // a failure — see
        // https://docs.rs/winit/latest/winit/platform/web/. Filter
        // it out here so our catch handler doesn't show a red
        // "Failed to start" overlay on top of a perfectly working
        // canvas.
        const WINIT_CONTROL_FLOW = /Using exceptions for control flow/;

        try {
            await init();
            document.getElementById('loading')?.remove();
        } catch (err) {
            if (WINIT_CONTROL_FLOW.test(String(err?.message ?? err))) {
                // Demo is up — winit just escaped the init call
                // stack to hand back to requestAnimationFrame.
                document.getElementById('loading')?.remove();
            } else {
                const el = document.getElementById('loading');
                if (el) {
                    el.textContent = 'Failed to start demo — see console for details.';
                    el.style.opacity = '1';
                    el.style.color = '#ef4444';
                }
                console.error(err);
            }
        }
    </script>
</body>
</html>
