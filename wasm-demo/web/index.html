<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>slint-mapping — live demo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1a1a1a;
            color: #ddd;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        canvas {
            /* Slint / winit-web inserts the rendering canvas into the
               document body. Make it fill the viewport so the map
               isn't a 300×150-pixel postage stamp in the corner. */
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loading">Loading slint-mapping demo…</div>
    <script type="module">
        // `--target web` emits an ES module shim. The default export
        // `init()` resolves once the wasm has fetched and instantiated;
        // the `#[wasm_bindgen(start)]` entry in lib.rs runs as part of
        // that resolution.
        import init from './pkg/slint_mapping_wasm_demo.js';
        try {
            await init();
            document.getElementById('loading')?.remove();
        } catch (err) {
            const el = document.getElementById('loading');
            if (el) {
                el.textContent = 'Failed to start demo — see console for details.';
                el.style.opacity = '1';
                el.style.color = '#ef4444';
            }
            console.error(err);
        }
    </script>
</body>
</html>
